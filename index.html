<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="todo-container">
            <div id="header">
                <h1>To Do List</h1>
            </div>
        </div>

        <div id ="todo-form">
            <input 
                type="text"
                class="input-item" 
                name="input_box"
                id="input-box"
                placeholder="Add Task"
            />

            <!--button to make the to do items-->
            <button id="input-button" onclick="addTask()">Add</button>

            <!-- the task List-->
            <h2>Task List</h2>
            <ul id="list-container"></ul>
        

            <hr />
            <!--task list counter-->
            <div class="counter-container">
                <div id="task-counters">
                    Completed: <span id="completed-counter">0 </span>| Uncompleted: 
                    <span id="uncompleted-counter">0</span>
                </div>
            </div>
        </div>

        <script src="garden.js"></script>
            <script type="text/javascript">
                li.innerHTML = `
                    <label>
                        <input type-"checkbox">
                        <span>${task}</span>
                    </label>
                    <span class="edit-btn">Edit</span>
                    <span class="delete-btn">Delete</span>
                    listContainer.appendChild(li);
                    `;
            
            </script>   

    </body>


</html>
