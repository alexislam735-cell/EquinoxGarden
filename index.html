<!DOCTYPE html>
<html>
    <head>
        <title>To Do List</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="todo-container">
            <div id="header">
                <h1>To Do List</h1>
            </div>

        <div id ="todo-form">
            <input 
                type="text"
                class="input-item" 
                name="input_box"
                id="input-box"
                placeholder="Add Task"
            />

            <!--button to make the to do items-->
            <button id="input-button" onclick="addTask()">Add</button>
        </div>

            <!-- the task List-->
            <h2>Task List</h2>
            <ul id="list-container"></ul>
        </div>

        <div class="cherry-blossom">
            <img id="blossom-img" src="imgs/Cherry Blossem-1.png.png" alt="Cherry blossom">
            <br>
            <button onclick="cycleBlossoms()">Next Stage</button>
        </div>
        
            <hr />
            <!--task list counter-->
            <div class="counter-container">
                <div id="task-counters">
                    Completed: <span id="completed-counter">0 </span>| Uncompleted: 
                    <span id="uncompleted-counter">0</span>
                </div>
            </div>
            <div class='flower1'>
                <img id="New Piskel-img" src="imgs/New Piskel-1.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-2.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-3.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-1.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-2.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-3.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-1.png.png" alt="Flower">
                <img id="New Piskel-img" src="imgs/New Piskel-2.png.png" alt="Flower">
            </div>
            
        <script type="text/javascript" src="garden.js"></script>
    </body>
</html>
